name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Compile Python modules
        run: python3 -B -m compileall core examples tests benchmarks configs evaluation schemas templates

      - name: Check formatting
        run: black --check --workers 1 core examples tests benchmarks configs evaluation schemas templates

      - name: Lint
        run: ruff check core examples tests benchmarks configs evaluation schemas templates

      - name: Run tests
        run: pytest

      - name: Run baseline evaluation
        run: python3 -B examples/run_evaluation.py evaluation/fixtures/baseline.json

      - name: Run full demo
        run: python3 -B examples/run_demo.py --mode full

      - name: Run temporal demo
        run: python3 -B examples/run_temporal_demo.py

      - name: Run identity demo
        run: python3 -B examples/run_identity_demo.py

      - name: Run Holly scenarios
        run: |
          python3 -B examples/run_holly.py --scenario project-companion
          python3 -B examples/run_holly.py --scenario support-continuity
          python3 -B examples/run_holly.py --scenario operations-observer
          python3 -B examples/run_holly.py --scenario temporal-layering
          python3 -B examples/run_holly.py --scenario persistent-identity
          python3 -B examples/run_holly.py --scenario safety-gate
          python3 -B examples/run_holly.py --scenario project-companion --provider mock

      - name: Run configured agent and comparison demo
        run: |
          python3 -B examples/run_agent.py --config templates/minimal_agent.json --scenario project-companion
          python3 -B examples/run_agent.py --config templates/minimal_agent.json --scenario project-companion --provider mock
          python3 -B examples/run_config_comparison.py
          python3 -B examples/run_provider_demo.py
          python3 -B examples/run_provider_comparison.py

      - name: Validate provider schemas
        run: python3 -m pytest -q tests/test_model_providers.py::test_provider_config_schema_accepts_packaged_examples

      - name: Run benchmarks
        run: python3 -B benchmarks/run_all.py

      - name: Build wheel
        run: python3 -B -m build --wheel --no-isolation --outdir dist

      - name: Smoke test installed wheel
        run: |
          python3 -m venv /tmp/centroid-wheel-smoke
          /tmp/centroid-wheel-smoke/bin/python -m pip install dist/*.whl
          /tmp/centroid-wheel-smoke/bin/centroid-holly --scenario project-companion
          /tmp/centroid-wheel-smoke/bin/centroid-holly --scenario project-companion --provider mock
          /tmp/centroid-wheel-smoke/bin/centroid-agent --config templates/minimal_agent.json --scenario project-companion --provider mock
          /tmp/centroid-wheel-smoke/bin/centroid-eval
          /tmp/centroid-wheel-smoke/bin/centroid-demo --mode full
          /tmp/centroid-wheel-smoke/bin/centroid-provider-demo
          /tmp/centroid-wheel-smoke/bin/centroid-provider-comparison
          /tmp/centroid-wheel-smoke/bin/python -c "from core.models import get_provider_config; c=get_provider_config('mock'); assert c.provider_id == 'mock'"
          /tmp/centroid-wheel-smoke/bin/python -c "from examples.run_config_comparison import main; raise SystemExit(main())"

      - name: Scan for credentials and private endpoints
        run: |
          ! grep -RIn --exclude=ci.yml -E 'api[_-]?key[=:][^[:space:]]+|Bearer [^[:space:]]+|password[=:][^[:space:]]+|100\.|10\.|192\.168\.|172\.(1[6-9]|2[0-9]|3[01])\.' .env.example configs core examples tests schemas docs .github 2>/dev/null
