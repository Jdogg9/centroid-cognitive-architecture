name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Compile Python modules
        run: python3 -B -m compileall core examples tests benchmarks

      - name: Check formatting
        run: black --check --workers 1 core examples tests benchmarks

      - name: Lint
        run: ruff check core examples tests benchmarks

      - name: Run tests
        run: pytest

      - name: Run baseline evaluation
        run: python3 -B examples/run_evaluation.py evaluation/fixtures/baseline.json

      - name: Run full demo
        run: python3 -B examples/run_demo.py --mode full

      - name: Run benchmarks
        run: python3 -B benchmarks/run_all.py
