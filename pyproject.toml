[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "centroid-cognitive-architecture"
version = "0.1.0"
description = "Reference scaffold for persistent distributed self-modeling agent systems."
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}
authors = [{name = "Centroid Contributors"}]

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[tool.setuptools.packages.find]
where = ["."]
include = ["core*", "nodes*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]

